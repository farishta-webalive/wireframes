document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

e(v => String(v).toLowerCase().includes(q)));\n      }\n      list.sort((a,b)=>{\n        const av=a[this.sort.by], bv=b[this.sort.by]; const m = this.sort.dir==='asc'?1:-1;\n        return av>bv?m:av<bv?-m:0;\n      });\n      return list;\n    }\n  },\n  methods:{\n    fmtDate, fmtMoney,\n    setSort(by){\n      if (this.sort.by === by) this.sort.dir = this.sort.dir==='asc'?'desc':'asc';\n      else { this.sort.by = by; this.sort.dir = 'desc'; }\n    },\n    sortIcon(by){ return this.sort.by===by ? (this.sort.dir==='asc'?'chevron-up':'chevron-down') : 'chevrons-up-down'; }\n  },\n  template:`\n  <div class=\"p-8 space-y-5 max-w-[1600px]\">\n    <div class=\"flex items-start justify-between flex-wrap gap-4\">\n      <div>\n        <div class=\"text-xs font-semibold text-teal-600 uppercase tracking-wider mb-1\">My Orders<\u002Fdiv>\n        <h1 class=\"text-2xl font-semibold text-navy-900\">All treatment requests<\u002Fh1>\n        <p class=\"text-sm text-slate-500 mt-1\">{{ state.orders.length }} orders across {{ state.profile.facilities.length }} facilities. Click any row for details.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"flex gap-2\">\n        <Btn kind=\"secondary\" icon=\"download\">Export<\u002FBtn>\n        <Btn as=\"router-link\" :to=\"{ path:'/forms' }\" icon=\"file-plus-2\">New request<\u002FBtn>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Filters -->\n    <div class=\"bg-white border border-slate-200 rounded-lg shadow-card p-4 flex items-center gap-3 flex-wrap\">\n      <div class=\"relative flex-1 min-w-[260px]\">\n        <Icon name=\"search\" :size=\"16\" cls=\"absolute left-3 top-1/2 -translate-y-1/2 text-slate-400\"/>\n        <input v-model=\"q\" placeholder=\"Search reference, PO, consignor, consignee, goods…\" class=\"pl-9 pr-3 py-2 w-full rounded-lg border border-slate-300 text-sm focus-ring\"/>\n      <\u002Fdiv>\n      <select v-model=\"facility\" class=\"px-3 py-2 rounded-lg border border-slate-300 text-sm focus-ring bg-white\">\n        <option value=\"ALL\">All facilities<\u002Foption>\n        <option v-for=\"f in myFacilities\" :key=\"f.code\" :value=\"f.code\">{{ f.name }} ({{ f.code }})<\u002Foption>\n      <\u002Fselect>\n      <select v-model=\"treatment\" class=\"px-3 py-2 rounded-lg border border-slate-300 text-sm focus-ring bg-white\">\n        <option value=\"ALL\">All treatments<\u002Foption>\n        <option>Gamma<\u002Foption><option>ETO<\u002Foption><option>GMP<\u002Foption><option>Gamma+ETO<\u002Foption>\n      <\u002Fselect>\n      <select v-model=\"bc\" class=\"px-3 py-2 rounded-lg border border-slate-300 text-sm focus-ring bg-white\">\n        <option value=\"ALL\">All BC sync states<\u002Foption>\n        <option value=\"pending\">Pending<\u002Foption><option value=\"syncing\">Syncing<\u002Foption>\n        <option value=\"synced\">Synced<\u002Foption><option value=\"failed\">Failed<\u002Foption><option value=\"dead\">Dead letter<\u002Foption>\n      <\u002Fselect>\n      <div class=\"flex items-center gap-1 text-xs\">\n        <input type=\"date\" v-model=\"dateFrom\" class=\"px-2 py-2 rounded-lg border border-slate-300 text-sm focus-ring bg-white\" aria-label=\"From date\"/>\n        <span class=\"text-slate-400\">→<\u002Fspan>\n        <input type=\"date\" v-model=\"dateTo\"   class=\"px-2 py-2 rounded-lg border border-slate-300 text-sm focus-ring bg-white\" aria-label=\"To date\"/>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Table -->\n    <div class=\"bg-white border border-slate-200 rounded-lg shadow-card overflow-hidden\">\n      <table class=\"w-full text-sm\">\n        <thead class=\"bg-slate-50 text-left text-xs text-slate-500 uppercase tracking-wider\">\n          <tr>\n            <th class=\"px-5 py-3\"><button @click=\"setSort('id')\" class=\"inline-flex items-center gap-1\">Reference <Icon :name=\"sortIcon('id')\" :size=\"12\"/><\u002Fbutton><\u002Fth>\n            <th class=\"px-5 py-3\">Facility<\u002Fth>\n            <th class=\"px-5 py-3\">Form<\u  :status=\"o.status\"/><\u002Ftd>\n            <td class=\"px-5 py-3\"><BcSyncChip :status=\"o.bcSync\" small/><\u002Ftd>\n            <td class=\"px-5 py-3 text-right\"><Icon name=\"chevron-right\" :size=\"14\" cls=\"text-slate-400\"/><\u002Ftd>\n          <\u002Ftr>\n          <tr v-if=\"filtered.length===0\"><td colspan=\"9\" class=\"px-5 py-12 text-center text-slate-500\"><Icon name=\"search-x\" :size=\"24\" cls=\"mx-auto mb-2 text-slate-300\"/>No orders match the current filters.<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n  <\u002Fdiv>`\n};\n\n/* ---------- Page: Order Detail ---------------------------------------------- */\n\nconst OrderDetailPage = {\n  components:{ Icon, Btn, TreatmentChip, BcSyncChip, StatusBadge },\n  computed:{\n    state(){ return state; },\n    order(){ return state.orders.find(o => o.id === this.$route.params.id); },\n    timeline(){\n      if (!this.order) return [];\n      const e = [\n        { ts: this.order.submitted + 'T09:12', label:'Submitted via portal', icon:'upload', done:true },\n        { ts: this.order.submitted + 'T09:12', label:'Exsited order created · ' + this.order.exsitedId, icon:'receipt', done:true },\n      ];\n      if (this.order.bcSync === 'pending')  e.push({ ts:this.order.submitted+'T09:14', label:'Business Central sync queued', icon:'clock', done:false });\n      if (this.order.bcSync === 'syncing')  e.push({ ts:this.order.submitted+'T09:14', label:'Business Central sync in progress', icon:'refresh-cw', done:false, pulse:true });\n      if (this.order.bcSync === 'synced')   e.push({ ts:this.order.submitted+'T09:20', label:'BC customer invoice created · ' + this.order.bcId, icon:'check-circle-2', done:true });\n      if (this.order.bcSync === 'failed')   e.push({ ts:this.order.submitted+'T09:18', label:'BC sync failed — will retry', icon:'x-circle', done:false, fail:true });\n      if (this.order.bcSync === 'dead')     e.push({ ts:this.order.submitted+'T09:40', label:'BC sync moved to dead-letter queue', icon:'alert-octagon', done:false, fail:true });\n      if (['In treatment','Awaiting collection','Completed'].includes(this.order.status))\n        e.push({ ts: this.order.collection+'T06:00', label:'Goods received at facility', icon:'package-check', done:true });\n      if (['In treatment','Completed'].includes(this.order.status))\n        e.push({ ts: this.order.collection+'T11:30', label:'Treatment started', icon:'radiation', done:true });\n      if (this.order.status === 'Awaiting collection')\n        e.push({ ts: this.order.collection+'T15:00', label:'Awaiting customer collection', icon:'truck', done:false });\n      if (this.order.status === 'Completed')\n        e.push({ ts: this.order.collection+'T16:00', label:'Released to consignee', icon:'badge-check', done:true });\n      return e;\n    }\n  },\n  methods:{ fmtDate, fmtMoney }\n  ,template:`\n  <div v-if=\"!order\" class=\"p-12 text-slate-500\">Order not found.<\u002Fdiv>\n  <div v-else class=\"p-8 max-w-[1400px]\">\n    <!-- Breadcrumb -->\n    <div class=\"flex items-center gap-2 text-xs text-slate-500 mb-4\">\n      <router-link to=\"/orders\" class=\"hover:text-teal-600\">Orders<\u002Frouter-link>\n      <Icon name=\"chevron-right\" :size=\"12\"/>\n      <span class=\"font-mono text-navy-900\">{{ order.id }}<\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"flex items-start justify-between gap-4 flex-wrap mb-6\">\n      <div>\n        <div class=\"flex items-center gap-2 mb-2\">\n          <TreatmentChip :treatment=\"order.treatment\"/>\n          <StatusBadge :status=\"order.status\"/>\n          <BcSyncChip :status=\"order.bcSync\"/>\n        <\u002Fdiv>\n        <h1 class=\"text-2xl font-semibold text-navy-900\">{{ order.formName }}<\u002Fh1>\n        <div class=\"text-sm text-slate-500 mt-1\">{{ order.formCode }} · {{ order.facility }} · Submitted {{ fmtDate(order.submitted) }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"flex gap-2\">\n        <Btn kind=\"ghost\" icon=\"download\">PDF<\u002FBtn>\n        <Btn kind=\"secondary\" icon=\"pencil\">Edit<\u002FBtn>\n        <Btn kind=\"navy\" icon=\"copy\">Duplicate<\u002FBtn>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"grid grid-cols-1 lg:grid-cols-3 gap-6\">\n      <!-- Left: summary -->\n      <div class=\"lg:col-span-2 space-y-4\">\n        <section class=\"bg-white border border-slate-200 rounded-lg shadow-card\">\n          <header class=\"px-6 py-3 border-b border-slate-100 font-semibold text-sm text-navy-900\">Customer<\u002Fheader>\n          <div class=\"p-6 grid grid-cols-2 gap-4 text-sm\">\n            <div><div class=\"text-[11px] uppercase tracking-wider text-slate-500\">Company<\u002Fdiv><div class=\"mt-0.5 text-navy-900\">{{ state.profile.company }}<\u002Fdiv><\u002Fdiv>\n            <div><div class=\"text-[11px] uppercase tracking-wider text-slate-500\">ABN<\u002Fdiv><div class=\"mt-0.5 text-navy-900\">{{ state.profile.abn }}<\u002Fdiv><\u002Fdiv>\n            <div><div class=\"text-[11px] uppercase tracking-wider text-slate-500\">Contact<\u002Fdiv><div class=\"mt-0.5 text-navy-900\">{{ state.profile.contact }}<\u002Fdiv><\u002Fdiv>\n            <div><div class=\"text-[11px] uppercase tracking-wider text-slate-500\">BC Customer<\u002Fdiv><div class=\"mt-0.5 font-mono text-navy-900\">{{ state.profile.bcCustomerNumber }}<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsection>\n        <section class=\"bg-white border border-slate-200 rounded-lg shadow-card\">\n          <header class=\"px-6 py-3 border-b border-slate-100 font-semibold text-sm text-navy-900\">Consignment<\u002Fheader>\n          <div class=\"p-6 grid grid-cols-2 gap-4 text-sm\">\n            <div><div class=\"text-[11px] uppercase tracking-wider text-slate-500\">Purchase order<\u002Fdiv><div class=\"mt-0.5 font-mono text-navy-900\">{{ order.po }}<\u002Fdiv><\u002Fdiv>\n            <div><div class=\"text-[11px] uppercase tracking-wider text-slate-500\">Expected delivery<\u002Fdiv><div class=\"mt-0.5 text-navy-900\">{{ fmtDate(order.collection) }}<\u002Fdiv><\u002Fdiv>\n            <div><div class=\"text-[11px] uppercase tracking-wider text-slate-500\">Consignor<\u002Fdiv><div class=\"mt-0.5 text-navy-900\">{{ order.consignor }}<\u002Fdiv><\u002Fdiv>\n            <div><div class=\"text-[11px] uppercase tracking-wider text-slate-500\">Consignee<\u002Fdiv><div class=\"mt-0.5 text-navy-900\">{{ order.consignee }}<\u002Fdiv><\u002Fdiv>\n            <div class=\"col-span-2\"><div class=\"text-[11px] uppercase tracking-wider text-slate-500\">Description of goods<\u002Fdiv><div class=\"mt-0.5 text-navy-900\">{{ order.goods }}<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsection>\n        <section v-if=\"order.doseKGy\" class=\"bg-white border border-slate-200 rounded-lg shadow-card\">\n          <header class=\"px-6 py-3 border-b border-slate-100 font-semibold text-sm text-navy-900\">Treatment parameters<\u002Fheader>\n          <div class=\"p-6 grid grid-cols-2 gap-4 text-sm\">\n            <div><div class=\"text-[11px] uppercase tracking-wider text-slate-500\">Target dose<\u002Fdiv><div class=\"mt-0.5 text-navy-900 font-medium\">{{ order.doseKGy }} kGy<\u002Fdiv><\u002Fdiv>\n            <div><div class=\"text-[11px] uppercase tracking-wider text-slate-500\">Treatment type<\u002Fdiv><div class=\"mt-0.5 text-navy-900\">Routine<\u002Fdiv><\u002Fdiv>\n            <div><div class=\"text-[11px] uppercase tracking-wider text-slate-500\">RPI<\u002Fdiv><div class=\"mt-0.5 text-navy-900 font-mono\">RPI-{{ order.id.slice(-4) }}<\u002Fdiv><\u002Fdiv>\n            <div><div class=\"text-[11px] uppercase tracking-wider text-slate-500\">ISO 11137 compliance<\u002Fdiv><div class=\"mt-0.5 text-navy-900\">Dose mapping · Bioburden<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsection>\n        <section class=\"bg-white border border-slate-200 rounded-lg shadow-card\">\n          <header class=\"px-6 py-3 border-b border-slate-100 font-semibold text-sm text-navy-900 flex items-center justify-between\">\n            <span>Attachments<\u002Fspan>\n            <span class=\"text-xs text-slate-500 font-normal\">2 files<\u002Fspan>\n          <\u002Fheader>\n          <div class=\"divide-y divide-slate-100\">\n            <div class=\"px-6 py-3 flex items-center gap-3 text-sm\">\n              <div class=\"w-8 h-8 rounded bg-slate-100 flex items-center justify-center\"><Icon name=\"file-text\" :size=\"14\" cls=\"text-teal-600\"/><\u002Fdiv>\n              <div class=\"flex-1\"><div class=\"font-medium text-navy-900\">msds-{{ order.formCode.toLowerCase() }}.pdf<\u002Fdiv><div class=\"text-xs text-slate-500\">184 KB · uploaded at submission<\u002Fdiv><\u002Fdiv>\n              <button class=\"text-teal-600 text-xs hover:underline\">Download<\u002Fbutton>\n            <\u002Fdiv>\n            <div class=\"px-6 py-3 flex items-center gap-3 text-sm\">\n              <div class=\"w-8 h-8 rounded bg-slate-100 flex items-center justify-center\"><Icon name=\"file-text\" :size=\"14\" cls=\"text-teal-600\"/><\u002Fdiv>\n              <div class=\"flex-1\"><div class=\"font-medium text-navy-900\">coa-{{ order.id.toLowerCase() }}.pdf<\u002Fdiv><div class=\"text-xs text-slate-500\">92 KB · uploaded at submission<\u002Fdiv><\u002Fdiv>\n              <button class=\"text-teal-600 text-xs hover:underline\">Download<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsection>\n      <\u002Fdiv>\n\n      <!-- Right: metadata / timeline -->\n      <div class=\"space-y-4\">\n        <section class=\"bg-white border border-slate-200 rounded-lg shadow-card\">\n          <header class=\"px-5 py-3 border-b border-slate-100 font-semibold text-sm text-navy-900\">Integrations<\u002Fheader>\n          <div class=\"p-5 space-y-3 text-sm\">\n            <div class=\"flex items-center justify-between\">\n              <div class=\"text-slate-500 text-xs uppercase tracking-wider\">Exsited<\u002Fdiv>\n              <span class=\"text-emerald-600 text-xs inline-flex items-center gap-1\"><Icon name=\"check-circle-2\" :size=\"12\"/>Created<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"font-mono text-navy-900\">{{ order.exsitedId }}<\u002Fdiv>\n            <hr class=\"border-slate-100\"/>\n            <div class=\"flex items-center justify-between\">\n              <div class=\"text-slate-500 text-xs uppercase tracking-wider\">Business Central<\u002Fdiv>\n              <BcSyncChip :status=\"order.bcSync\" small/>\n            <\u002Fdiv>\n            <div class=\"font-mono text-navy-900\">{{ order.bcId }}<\u002Fdiv>\n            <div v-if=\"order.bcSync==='failed' || order.bcSync==='dead'\" class=\"mt-2 bg-red-50 border border-red-200 text-red-800 rounded p-3 text-xs\">\n              Last error: <span class=\"font-mono\">BC-422: customer credit hold<\u002Fspan>. Retry scheduled.\n              <button class=\"mt-2 text-red-700 underline\">Retry now<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsection>\n\n        <section class=\"bg-white border border-slate-200 rounded-lg shadow-card\">\n          <header class=\"px-5 py-3 border-b border-slate-100 font-semibold text-sm text-navy-900\">Status timeline<\u002Fheader>\n          <ol class=\"p-5 space-y-4\">\n            <li v-for=\"(e,i) in timeline\" :key=\"i\" class=\"flex gap-3\">\n              <div :class=\"['w-8 h-8 rounded-full shrink-0 flex items-center justify-center',\n                            e.fail ? 'bg-red-100 text-red-700' :\n                            e.done ? 'bg-emerald-100 text-emerald-700' :\n                            'bg-slate-100 text-slate-600', e.pulse && 'animate-syncpulse']\">\n                <Icon :name=\"e.icon\" :size=\"14\"/>\n              <\u002Fdiv>\n              <div class=\"flex-1 text-sm pb-1\">\n                <div class=\"text-navy-900\">{{ e.label }}<\u002Fdiv>\n                <div class=\"text-[11px] text-slate-500 mt-0.5\">{{ e.ts.replace('T',' · ') }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fli>\n          <\u002Fol>\n        <\u002Fsection>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>`\n};\n\n/* ---------- Page: Settings (tabs) ------------------------------------------- */\n\nconst SettingsPage = {\n  components:{ Icon, Btn, TreatmentChip },\n  data(){ return {\n    tab: this.$route.query.tab || 'profile',\n    pwd: { current:'', next:'', confirm:'' },\n    editCommodity: null, editConsignor: null, editConsignee: null,\n  }; },\n  computed:{\n    state(){ return state; },\n    tabs(){ return [\n      { id:'profile',     label:'Profile',     icon:'user' },\n      { id:'password',    label:'Password',    icon:'lock' },\n      { id:'commodities', label:'Commodities', icon:'package' },\n      { id:'consignors',  label:'Consignors',  icon:'warehouse' },\n      { id:'consignees',  label:'Consignees',  icon:'truck' },\n    ]; }\n  },\n  watch:{\n    tab(v){ this.$router.replace({ query:{ tab:v } }); }\n  },\n  methods:{\n    addRow(kind){\n      const seed = { id: 'NEW-' + Date.now(), name:'', contact:'', phone:'', address:'' };\n      if (kind==='commodities') state.commodities.unshift({ id: 'C-NEW', name:'', tariffCode:'', treatment:'Gamma', defaultDoseKGy:0, notes:'' });\n      if (kind==='consignors')  state.consignors.unshift(seed);\n      if (kind==='consignees')  state.consignees.unshift(seed);\n    },\n    removeRow(kind, i){\n      if (kind==='commodities') state.commodities.splice(i,1);\n      if (kind==='consignors')  state.consignors.splice(i,1);\n      if (kind==='consignees')  state.consignees.splice(i,1);\n    }\n  },\n  template:`\n  <div class=\"p-8 max-w-[1200px]\">\n    <div class=\"mb-6\">\n      <div class=\"text-xs font-semibold text-teal-600 uppercase tracking-wider mb-1\">Settings<\u002Fdiv>\n      <h1 class=\"text-2xl font-semibold text-navy-900\">Account & shared data<\u002Fh1>\n      <p class=\"text-sm text-slate-500 mt-1\">Commodities, consignors and consignees are shared across all your facilities.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"flex gap-1 border-b border-slate-200 mb-6\">\n      <button v-for=\"t in tabs\" :key=\"t.id\" @click=\"tab=t.id\"\n              :class=\"['px-4 py-2 text-sm font-medium flex items-center gap-2 border-b-2 -mb-px',\n                       tab===t.id ? 'border-teal-500 text-teal-700' : 'border-transparent text-slate-600 hover:text-navy-900']\">\n        <Icon :name=\"t.icon\" :size=\"14\"/>{{ t.label }}\n      <\u002Fbutton>\n    <\u002Fdiv>\n\n    <!-- Profile -->\n    <div v-if=\"tab==='profile'\" class=\"bg-white border border-slate-200 rounded-lg shadow-card p-6 grid grid-cols-2 gap-5 max-w-3xl\">\n      <div class=\"col-span-2 flex items-center gap-4 pb-4 border-b border-slate-100\">\n        <div class=\"w-14 h-14 rounded-full bg-teal-500 text-white flex items-center justify-center text-lg font-semibold\">{{ state.profile.contact.split(' ').map(s=>s[0]).slice(0,2).join('') }}<\u002Fdiv>\n        <div>\n          <div class=\"font-semibold text-navy-900\">{{ state.profile.company }}<\u002Fdiv>\n          <div class=\"text-xs text-slate-500\">{{ state.profile.bcCustomerNumber }} · Active customer<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div><label class=\"block text-xs font-medium text-slate-700 mb-1\">Company<\u002Flabel><input v-model=\"state.profile.company\" class=\"w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus-ring\"/><\u002Fdiv>\n      <div><label class=\"block text-xs font-medium text-slate-700 mb-1\">ABN<\u002Flabel><input v-model=\"state.profile.abn\" class=\"w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus-ring\"/><\u002Fdiv>\n      <div><label class=\"block text-xs font-medium text-slate-700 mb-1\">Contact name<\u002Flabel><input v-model=\"state.profile.contact\" class=\"w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus-ring\"/><\u002Fdiv>\n      <div><label class=\"block text-xs font-medium text-slate-700 mb-1\">Phone<\u002Flabel><input v-model=\"state.profile.phone\" class=\"w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus-ring\"/><\u002Fdiv>\n      <div class=\"col-span-2\"><label class=\"block text-xs font-medium text-slate-700 mb-1\">Email<\u002Flabel><input v-model=\"state.profile.email\" class=\"w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus-ring\"/><\u002Fdiv>\n      <div class=\"col-span-2 flex justify-end pt-4 border-t border-slate-100\"><Btn icon=\"save\">Save changes<\u002FBtn><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Password -->\n    <div v-if=\"tab==='password'\" class=\"bg-white border border-slate-200 rounded-lg shadow-card p-6 max-w-lg space-y-4\">\n      <div><label class=\"block text-xs font-medium text-slate-700 mb-1\">Current password<\u002Flabel><input type=\"password\" v-model=\"pwd.current\" class=\"w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus-ring\"/><\u002Fdiv>\n      <div><label class=\"block text-xs font-medium text-slate-700 mb-1\">New password<\u002Flabel><input type=\"password\" v-model=\"pwd.next\" class=\"w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus-ring\"/><\u002Fdiv>\n      <div><label class=\"block text-xs font-medium text-slate-700 mb-1\">Confirm new password<\u002Flabel><input type=\"password\" v-model=\"pwd.confirm\" class=\"w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus-ring\"/><\u002Fdiv>\n      <div class=\"text-[11px] text-slate-500\">Minimum 12 characters · 1 uppercase · 1 number · 1 symbol<\u002Fdiv>\n      <div class=\"pt-4 border-t border-slate-100 flex justify-end\"><Btn icon=\"lock\">Update password<\u002FBtn><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Commodities -->\n    <div v-if=\"tab==='commodities'\" class=\"space-y-3\">\n      <div class=\"flex items-center justify-between\">\n        <div class=\"text-sm text-slate-500\"><strong class=\"text-navy-900\">{{ state.commodities.length v>\n    <\u002Fdiv>\n\n    <div class=\"mt-8 bg-slate-50 border border-slate-200 rounded-lg p-4 text-xs text-slate-600\">\n      <strong class=\"text-navy-900\">Live values<\u002Fstrong>\n      <pre class=\"mt-2 font-mono text-[11px] leading-relaxed whitespace-pre-wrap\">{{ JSON.stringify({ text, textarea, email, phone, num, date, radio, checkSingle, checkMulti, select, file, sig: sig ? '[signature captured]' : '', calcTotal }, null, 2) }}<\u002Fpre>\n    <\u002Fdiv>\n  <\u002Fdiv>`\n};\n\n/* ---------- Router ---------------------------------------------------------- */\nconst requireAuth = (to, from, next) => { if (state.authed) next(); else next('/login'); };\n\nconst router = createRouter({\n  history: createWebHashHistory(),\n  routes: [\n    { path:'/login',    component: LoginPage },\n    { path:'/signup',   component: SignupPage },\n    { path:'/',          component: Shell, beforeEnter: requireAuth,\n      children: [\n        { path:'',                                  redirect:'/dashboard' },\n        { path:'/dashboard',                        component: DashboardPage },\n        { path:'/forms',                            component: FormPickerPage },\n        { path:'/forms/:facility/:formKey',         component: FormRenderer },\n        { path:'/orders',                           component: OrdersPage },\n        { path:'/orders/:id',                       component: OrderDetailPage },\n        { path:'/submitted/:id',                    component: SubmittedPage },\n        { path:'/settings',                         component: SettingsPage },\n        { path:'/_dev/fields',                      component: DevFieldsPage },\n      ]\n    },\n    { path: '/:pathMatch(.*)*', redirect:'/dashboard' }\n  ]\n});\n\n/* ---------- Boot ------------------------------------------------------------ */\n\n// start authed for the wireframe so the user lands on the app\nstate.authed = true;\n\nconst app = createApp({});\napp.component('Icon', Icon);\napp.component('B
